name: Release
on:
  pull_request:
  merge_group:
  push:
    branches:
      - develop
    tags:
      - '*'
jobs:
  Build:
    name: Build and Test on ${{ matrix.python }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Build
        run: go build -v

      - name: Test
        run: |
          go test -coverprofile=./cov-report.out ./...
          # go tool cover -html=cov-report.out -o coverage-report.html
          go test -race -coverprofile=coverage.out -covermode=atomic

  Container:
    name: Build Container Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write version vars
        id: version-vars
        run: |
          BUILD_DATE=`date -u +"%Y-%m-%dT%H:%M:%SZ"`
          BRANCH=${GITHUB_REF_NAME#v}
          APP_VERSION=$(cat config.json | jq -r ".version")
          echo Version: $APP_VERSION
          echo "VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV

      - name: Build Container Image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          push: false
          tags: |
            cloudtooling/s3bucket-exporter:next
            cloudtooling/s3bucket-exporter:${{github.run_id }}
            cloudtooling/s3bucket-exporter:${{env.APP_VERSION}}_rc
          build-args: |
            BUILD_DATE=${{env.BUILD_DATE}}
            APP_VERSION=${{env.APP_VERSION}}

      - name: Log in to GitHub container registry
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USER}}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
        if: github.ref == 'refs/heads/develop'

      - name: Deploy Container Image
        id: push-to-dockerhub-release
        run: |
          docker push cloudtooling/s3bucket-exporter:next
          docker push cloudtooling/s3bucket-exporter:${{env.APP_VERSION}}_rc
        if: github.ref == 'refs/heads/develop'

  Build-results:
    name: Build results
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - Build
      - Container
    steps:
      - run: exit 1
        # see https://stackoverflow.com/a/67532120/4907315
        if: >-
          ${{

               contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
            || contains(needs.*.result, 'skipped')
            }}
