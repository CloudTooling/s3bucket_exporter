name: Create release # You may choose a different name
run-name: ${{ inputs.releaseversion }} # Enumerates entries in the "workflow runs" view
on:
    workflow_dispatch:
        inputs:
            releaseversion:
                description: 'Release version'
                required: true
                type: string
                default: "X.Y.Z"

jobs:
    Build:
        name: Build and Test
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
            -   name: Set up Go
                uses: actions/setup-go@v4
                with:
                    go-version: '1.20'

            -   name: Build
                run: go build -v

            -   name: Test
                run: |
                    go test -coverprofile=./cov-report.out ./...
                    # go tool cover -html=cov-report.out -o coverage-report.html
                    go test -race -coverprofile=coverage.out -covermode=atomic


    Release: # Arbitrarily chosen
        name: Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
            packages: write
            attestations: write
            id-token: write
        steps:

            -   uses: actions/create-github-app-token@v3
                id: app-token
                with:
                    app-id: ${{ vars.CI_APP_ID }}
                    private-key: ${{ secrets.CI_PRIVATE_KEY }}

            -   name: Checkout
                uses: actions/checkout@v5
                with:
                    fetch-depth: 0
                    token: ${{ steps.app-token.outputs.token }}
                    ref: ${{ github.head_ref }}

            -   name: Get GitHub App User ID
                id: get-user-id
                run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
                env:
                    GH_TOKEN: ${{ steps.app-token.outputs.token }}

            -   name: Configure Git author
                run: |
                    git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
                    git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>'

            -   name: Write version vars
                id: version-vars
                run: |
                    BUILD_DATE=`date -u +"%Y-%m-%dT%H:%M:%SZ"`
                    BRANCH=${GITHUB_REF_NAME#v}
                    APP_VERSION=$(cat config.json | jq -r ".version")
                    echo Version: $APP_VERSION
                    echo "VERSION=$APP_VERSION" >> $GITHUB_ENV
                    echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
                    echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV

            -   name: Build Container Image
                id: build-image
                uses: docker/build-push-action@v7
                with:
                    push: false
                    tags: |
                        cloudtooling/s3bucket-exporter:next
                        cloudtooling/s3bucket-exporter:${{github.run_id }}
                        cloudtooling/s3bucket-exporter:${{ github.event.inputs.releaseversion }}_rc
                    build-args: |
                        BUILD_DATE=${{env.BUILD_DATE}}
                        APP_VERSION=${{ github.event.inputs.releaseversion }}

            -   name: Log in to GitHub container registry
                uses: docker/login-action@v4
                with:
                    username: ${{ vars.DOCKER_HUB_USER}}
                    password: ${{ secrets.DOCKER_HUB_TOKEN }}
                if: github.ref == 'refs/heads/develop'

            -   name: Deploy Container Image
                id: push-to-dockerhub-release
                run: |
                    docker push cloudtooling/s3bucket-exporter:next
                    docker push cloudtooling/s3bucket-exporter:${{ github.event.inputs.releaseversion }}_rc
                if: github.ref == 'refs/heads/develop'

            -   name: Adding release notes
                uses: TriPSs/conventional-changelog-action@v6
                with:
                    input-file: CHANGELOG.md
                    github-token: ${{ steps.app-token.outputs.token }}
                    version-file: target/config.json
                    pre-release: true
                    skip-bump: true
                    skip-tag: true
                    skip-on-empty: true
                    tag-prefix: "v"

            -   name: Create Release on GH
                id: tag-and-release
                uses: avakar/tag-and-release@v1
                with:
                    draft: true
                    release_name: ${{ github.event.inputs.releaseversion }}
                    tag_name: v${{ github.event.inputs.releaseversion }}
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    Build-results:
        name: Build results
        if: ${{ always() }}
        runs-on: ubuntu-latest
        needs:
            - Build
            - Release
        steps:
            -   run: exit 1
                # see https://stackoverflow.com/a/67532120/4907315
                if: >-
                    ${{

                         contains(needs.*.result, 'failure')
                      || contains(needs.*.result, 'cancelled')
                      || contains(needs.*.result, 'skipped')
                      }}
